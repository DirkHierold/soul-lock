<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoulLock Pokedex</title>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            background: #05070f;
            color: #38bdf8;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 1. STARTBILDSCHIRM: Das 2x2 Retro-Grid */
        #pokedex-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            padding: 20px;
        }

        .grid-2x2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 260px;
        }

        .grid-cell {
            width: 100px;
            height: 100px;
            background: #0f172a;
            border: 4px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-cell img {
            width: 85px;
            height: 85px;
            image-rendering: pixelated;
        }

        /* Highlight für das zuletzt gefangene Pokémon */
        .grid-cell.latest-catch {
            border-color: #4ade80 !important;
            animation: highlight-pulse 1.5s infinite ease-in-out;
        }

        @keyframes highlight-pulse {
            0%   { box-shadow: 0 0 5px #4ade80; }
            50%  { box-shadow: 0 0 20px #4ade80; }
            100% { box-shadow: 0 0 5px #4ade80; }
        }

        /* 2. BRUT-PHASE: Das Vollbild-Overlay */
        #overlay-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05070f;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #incubator {
            width: 160px;
            height: 160px;
            background: #0f172a;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #overlaySprite {
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
        }

        #timer {
            font-size: 32px;
            margin-top: 30px;
            color: #38bdf8;
        }

        /* Dimm-Zustand für OLED-Modus */
        body.eco-mode #overlay-screen { background: #000000 !important; }
        body.eco-mode #timer          { opacity: 0 !important; }
        body.eco-mode #incubator {
            transform: scale(0.45);
            background: transparent !important;
            border-color: rgba(56, 189, 248, 0.2) !important;
            box-shadow: none !important;
            animation: pulse-eco 2.5s infinite ease-in-out;
        }
        body.eco-mode #overlaySprite {
            filter: brightness(0) invert(1) drop-shadow(0 0 4px #38bdf8);
        }

        @keyframes pulse-eco {
            0%   { opacity: 0.6; }
            50%  { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- Start-Screen mit Pokedex-Raster -->
    <div id="pokedex-screen" onclick="openOverlayForHatching()">
        <div class="grid-2x2" id="pokedexGrid">
            <!-- Zellen (IDs 1, 4, 7, 25) werden per JS generiert -->
        </div>
    </div>

    <!-- Gameplay-Overlay -->
    <div id="overlay-screen" onclick="handleOverlayClick()">
        <div id="incubator">
            <img id="overlaySprite" src="egg.png" alt="status">
        </div>
        <div id="timer">00:10</div>
    </div>

    <script>
        // Pokedex-Reihenfolge der 4 Test-Pokémon
        const DEX_IDS = [1, 4, 7, 25];

        let duration = 10; // Test-Timer
        let lastTime = Date.now();

        // Spielzustände: 'IDLE', 'RUNNING', 'ECO', 'SUCCESS', 'FAILED'
        let gameState = 'IDLE';
        let currentRewardId = null;
        let wakeLock = null;
        let countdownInterval = null;

        window.addEventListener('load', () => {
            // Hängenden Spielzustand sauber zurücksetzen
            const savedState = localStorage.getItem('soul_state');
            if (savedState === 'RUNNING' || savedState === 'ECO') {
                // Optional: Wenn du den Cheat-Fail willst, hier triggerCheatFail() aufrufen.
                // Für jetzt: sauberer Reset, damit das Grid sichtbar ist.
                localStorage.setItem('soul_state', 'IDLE');
            }
            gameState = 'IDLE';

            renderPokedexGrid();
        });

        // Generiert das 2x2 Raster basierend auf dem Speicher
        function renderPokedexGrid() {
            const caughtList = JSON.parse(localStorage.getItem('caught_ids')) || [];
            const latestCatch = localStorage.getItem('latest_catch_id');
            const gridContainer = document.getElementById('pokedexGrid');
            gridContainer.innerHTML = "";

            DEX_IDS.forEach(id => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';

                if (latestCatch && parseInt(latestCatch) === id) {
                    cell.classList.add('latest-catch');
                }

                const img = document.createElement('img');
                if (caughtList.includes(id)) {
                    img.src = `${id}.png`;   // Gefangen -> Vorderseite
                } else {
                    img.src = "0.png";       // Nicht gefangen -> Fragezeichen
                }
                img.alt = `#${id}`;

                cell.appendChild(img);
                gridContainer.appendChild(cell);
            });
        }

        async function openOverlayForHatching() {
            if (gameState !== 'IDLE') return;

            gameState = 'RUNNING';
            localStorage.setItem('soul_state', 'RUNNING');
            duration = 10;

            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}

            document.getElementById('overlay-screen').style.display = 'flex';
            document.getElementById('overlaySprite').src = "egg.png";
            document.getElementById('incubator').style.borderColor = "#38bdf8";
            updateTimerDisplay();

            lastTime = Date.now();
            startTimer();
        }

        function startTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (gameState !== 'RUNNING' && gameState !== 'ECO') return;

                const currentTime = Date.now();
                const timePassed = currentTime - lastTime;
                lastTime = currentTime;

                if (timePassed > 4000) {
                    shatterEgg();
                    return;
                }

                duration--;
                updateTimerDisplay();

                if (duration <= 0) {
                    triggerSuccess();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            let minutes = Math.floor(duration / 60);
            let seconds = duration % 60;
            document.getElementById('timer').innerText =
                `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function handleOverlayClick() {
            if (gameState === 'RUNNING') {
                gameState = 'ECO';
                localStorage.setItem('soul_state', 'ECO');
                document.body.classList.add('eco-mode');
            }
            else if (gameState === 'ECO') {
                gameState = 'RUNNING';
                localStorage.setItem('soul_state', 'RUNNING');
                document.body.classList.remove('eco-mode');
                lastTime = Date.now();
            }
            else if (gameState === 'SUCCESS' || gameState === 'FAILED') {
                closeOverlayAndReset();
            }
        }

        function triggerSuccess() {
            clearInterval(countdownInterval);
            gameState = 'SUCCESS';
            localStorage.setItem('soul_state', 'SUCCESS');

            currentRewardId = DEX_IDS[Math.floor(Math.random() * DEX_IDS.length)];

            let caughtList = JSON.parse(localStorage.getItem('caught_ids')) || [];
            if (!caughtList.includes(currentRewardId)) {
                caughtList.push(currentRewardId);
                localStorage.setItem('caught_ids', JSON.stringify(caughtList));
            }
            localStorage.setItem('latest_catch_id', currentRewardId);

            document.getElementById('overlaySprite').src = `${currentRewardId}.png`;
            document.getElementById('incubator').style.borderColor = "#4ade80";
            document.getElementById('timer').innerText = "✓";

            if (document.body.classList.contains('eco-mode')) {
                document.body.classList.remove('eco-mode');
            }
            if (wakeLock) wakeLock.release();
        }

        function shatterEgg() {
            clearInterval(countdownInterval);
            gameState = 'FAILED';
            localStorage.setItem('soul_state', 'FAILED');

            currentRewardId = DEX_IDS[Math.floor(Math.random() * DEX_IDS.length)];

            document.getElementById('overlaySprite').src = `${currentRewardId}_back.png`;
            document.getElementById('incubator').style.borderColor = "#f87171";

            if (document.body.classList.contains('eco-mode')) {
                document.body.classList.remove('eco-mode');
            }
            if (wakeLock) wakeLock.release();
        }

        function triggerCheatFail() {
            document.getElementById('overlay-screen').style.display = 'flex';
            shatterEgg();
            document.getElementById('timer').innerText = "✕";
        }

        function closeOverlayAndReset() {
            gameState = 'IDLE';
            localStorage.setItem('soul_state', 'IDLE');
            document.getElementById('overlay-screen').style.display = 'none';
            renderPokedexGrid();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' &&
                (gameState === 'RUNNING' || gameState === 'ECO')) {
                shatterEgg();
            }
        });
    </script>
</body>
</html>
