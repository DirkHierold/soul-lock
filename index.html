<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeZen</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeZen">
    <meta name="theme-color" content="#000000">

    <link rel="apple-touch-icon" href="pokezen-icon.png">
    <link rel="icon" type="image/png" href="pokezen-icon.png">

    <style>
        html, body {
            background: #05070f;
        }
        body {
            font-family: monospace;
            text-align: center;
            color: #38bdf8;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        body.overlay-open {
            overflow: hidden;
            height: 100vh;
        }

        #pokedex-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding: 16px 16px 40px 16px;
        }

        .grid-4xN {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 310px;
            justify-items: center;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .grid-cell {
            width: 65px;
            height: 65px;
            background: #0f172a;
            border: 2px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .grid-cell img {
            width: 80%;
            height: 80%;
            margin: auto;
            object-fit: contain;
            display: block;
        }

        .grid-cell img.is-ball,
        #overlaySprite.is-ball {
            width: 55%;
            height: 55%;
            margin: auto;
        }

        .grid-cell img.is-locked {
            opacity: 0.35;
            filter: grayscale(1);
        }

        .grid-label {
            font-size: 9px;
            color: #38bdf8;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.2px;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .grid-label.locked { opacity: 0.4; }

        .grid-cell.latest-catch {
            border-color: #4ade80 !important;
            animation: highlight-pulse 1.5s infinite ease-in-out;
        }

        @keyframes highlight-pulse {
            0%   { box-shadow: 0 0 5px #4ade80; }
            50%  { box-shadow: 0 0 20px #4ade80; }
            100% { box-shadow: 0 0 5px #4ade80; }
        }

        #overlay-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 15, 0.65);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #incubator {
            width: 160px;
            height: 160px;
            background: #0f172a;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #overlaySprite {
            width: 82%;
            height: 82%;
            margin: auto;
            object-fit: contain;
            display: block;
        }

        #overlaySprite.wiggle {
            animation: wiggle 1s infinite ease-in-out;
            transform-origin: 50% 80%;
        }
        @keyframes wiggle {
            0%   { transform: rotate(0deg); }
            15%  { transform: rotate(-8deg); }
            30%  { transform: rotate(0deg); }
            45%  { transform: rotate(8deg); }
            60%  { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        #overlayLabel {
            margin-top: 18px;
            font-size: 14px;
            color: #4ade80;
            min-height: 18px;
            letter-spacing: 0.5px;
        }

        #timer {
            font-size: 32px;
            margin-top: 16px;
            color: #38bdf8;
        }

        #resetBtn {
            display: none;
            margin-top: 30px;
            padding: 12px 24px;
            font-family: monospace;
            font-size: 22px;
            color: #38bdf8;
            background: #0f172a;
            border: 4px solid #38bdf8;
            cursor: pointer;
        }
        #resetBtn:active {
            background: #38bdf8;
            color: #0f172a;
        }

        /* DIMM-Modus */
        body.eco-mode #pokedex-screen { visibility: hidden; }
        body.eco-mode #overlay-screen {
            background: #000000 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.eco-mode #timer { opacity: 0 !important; }
        body.eco-mode #overlayLabel { opacity: 0 !important; }
        body.eco-mode #resetBtn { opacity: 0 !important; }
        body.eco-mode #incubator {
            transform: scale(0.45);
            background: transparent !important;
            border-color: transparent !important;
            box-shadow: none !important;
            animation: none !important;
        }
        body.eco-mode #overlaySprite {
            filter: brightness(0) invert(1);
            animation: none;
            transform-origin: center !important;
        }
        body.eco-mode #overlaySprite.wiggle {
            animation: wiggle 1s infinite ease-in-out;
            transform-origin: 50% 80% !important;
        }
        body.eco-mode.eco-success #overlaySprite {
            filter: brightness(0) invert(1);
            animation: none;
        }
    </style>
</head>
<body>

    <div id="pokedex-screen" onclick="openOverlayForHatching()">
        <div class="grid-4xN" id="pokedexGrid"></div>
    </div>

    <div id="overlay-screen" onclick="handleOverlayClick()">
        <div id="incubator">
            <img id="overlaySprite" src="poke-ball.png" alt="status">
        </div>
        <div id="overlayLabel"></div>
        <div id="timer">00:10</div>
        <button id="resetBtn" onclick="resetGame(event)">Reset?</button>
    </div>

    <script>

        const BALL_SRC = "poke-ball.png";

            131: 'Lapras',

            133: 'Evoli',
            134: 'Aquana',
            135: 'Blitza',
            136: 'Flamara',
            137: 'Porygon',
            138: 'Amonitas',
            139: 'Amoroso',
            140: 'Kabuto',
            141: 'Kabutops',
            142: 'Aerodactyl',
            143: 'Relaxo',
            144: 'Arktos',
            145: 'Zapdos',
            146: 'Lavados',
            147: 'Dratini',
            148: 'Dragonir',
            149: 'Dragoran',
            150: 'Mewtu',
            151: 'Mew'
        };

        const EVOLUTION_FROM = {
            2: 1,
            3: 2,
            5: 4,
            6: 5,
            8: 7,
            9: 8,
            11: 10,
            12: 11,
            14: 13,
            15: 14,
            17: 16,
            18: 17,
            20: 19,
            22: 21,
            24: 23,
            26: 25,
            28: 27,
            30: 29,
            31: 30,
            33: 32,
            34: 33,
            36: 35,
            38: 37,
            40: 39,
            42: 41,
            44: 43,
            45: 44,
            47: 46,
            49: 48,
            51: 50,
            53: 52,
            55: 54,
            57: 56,
            59: 58,
            61: 60,
            62: 61,
            64: 63,
            65: 64,
            67: 66,
            68: 67,
            70: 69,
            71: 70,
            73: 72,
            75: 74,
            76: 75,
            78: 77,
            80: 79,
            82: 81,
            85: 84,
            87: 86,
            89: 88,
            91: 90,
            93: 92,
            94: 93,
            97: 96,
            99: 98,
            101: 100,
            103: 102,
            105: 104,
            110: 109,
            112: 111,
            117: 116,
            119: 118,
            121: 120,
            130: 129,
            134: 133,
            135: 133,
            136: 133,
            139: 138,
            141: 140,
            148: 147,
            149: 148
        };

        let duration = 25*60;
        let lastTime = Date.now();

        let gameState = 'IDLE';
        let currentRewardId = null;
        let wakeLock = null;
        let countdownInterval = null;

        function showOverlay() {
            document.getElementById('overlay-screen').style.display = 'flex';
            document.body.classList.add('overlay-open');
        }
        function hideOverlay() {
            document.getElementById('overlay-screen').style.display = 'none';
            document.body.classList.remove('overlay-open');
        }

        window.addEventListener('load', () => {
            renderPokedexGrid();

            const savedState = localStorage.getItem('soul_state');
            const savedReward = parseInt(localStorage.getItem('current_reward_id'));

            if ((savedState === 'RUNNING' || savedState === 'ECO') && savedReward) {
                currentRewardId = savedReward;
                triggerCheatFail();
                return;
            }
            gameState = 'IDLE';
        });

        function labelFor(id) {
            const name = POKEMON_NAMES[id] || '???';
            return `#${id} ${name}`;
        }

        function getCaughtList() {
            return JSON.parse(localStorage.getItem('caught_ids')) || [];
        }

        function isEligible(id, caughtList) {
            const prereq = EVOLUTION_FROM[id];
            if (prereq === undefined) return true;
            return caughtList.includes(prereq);
        }

        function renderPokedexGrid() {
            const caughtList = getCaughtList();
            const latestCatch = localStorage.getItem('latest_catch_id');
            const gridContainer = document.getElementById('pokedexGrid');
            gridContainer.innerHTML = "";

            DEX_IDS.forEach(id => {
                const item = document.createElement('div');
                item.className = 'grid-item';

                const cell = document.createElement('div');
                cell.className = 'grid-cell';

                if (latestCatch && parseInt(latestCatch) === id) {
                    cell.classList.add('latest-catch');
                }

                const caught = caughtList.includes(id);
                const eligible = isEligible(id, caughtList);

                const img = document.createElement('img');
                if (caught) {
                    img.src = frontSprite(id);
                    img.alt = labelFor(id);
                } else {
                    img.src = BALL_SRC;
                    img.alt = "pokeball";
                    img.classList.add('is-ball');
                    if (!eligible) img.classList.add('is-locked');
                }
                cell.appendChild(img);

                const label = document.createElement('div');
                label.className = 'grid-label';
                if (!caught && !eligible) label.classList.add('locked');
                label.innerText = labelFor(id);

                item.appendChild(cell);
                item.appendChild(label);
                gridContainer.appendChild(item);
            });
        }

        function allCaught() {
            const caughtList = getCaughtList();
            return DEX_IDS.every(id => caughtList.includes(id));
        }

        function pickRewardId() {
            const caughtList = getCaughtList();
            const uncaught = DEX_IDS.filter(id => !caughtList.includes(id));
            const eligible = uncaught.filter(id => isEligible(id, caughtList));

            if (eligible.length > 0) {
                return eligible[Math.floor(Math.random() * eligible.length)];
            }
            if (uncaught.length > 0) {
                return uncaught[Math.floor(Math.random() * uncaught.length)];
            }
            return DEX_IDS[Math.floor(Math.random() * DEX_IDS.length)];
        }

        function setSprite(src, { wiggle = false } = {}) {
            const sprite = document.getElementById('overlaySprite');
            if (!sprite) return;
            const isBall = src === BALL_SRC;

            const apply = () => {
                sprite.src = src;
                sprite.classList.toggle('wiggle', wiggle);
                sprite.classList.toggle('is-ball', isBall);
            };

            const preload = new Image();
            preload.onload = apply;
            preload.onerror = apply;
            preload.src = src;
        }

        function setOverlayLabel(text, color) {
            const el = document.getElementById('overlayLabel');
            el.innerText = text || '';
            el.style.color = color || '#4ade80';
        }

        async function openOverlayForHatching() {
            if (gameState !== 'IDLE') return;

            if (allCaught()) {
                openResetPrompt();
                return;
            }

            currentRewardId = pickRewardId();
            localStorage.setItem('current_reward_id', currentRewardId);

            gameState = 'RUNNING';
            localStorage.setItem('soul_state', 'RUNNING');
            duration = 25*60;

            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}

            showOverlay();
            setSprite(BALL_SRC, { wiggle: true });
            setOverlayLabel('');
            document.getElementById('incubator').style.borderColor = "#38bdf8";
            document.getElementById('timer').style.color = "#38bdf8";
            document.getElementById('timer').style.display = "block";
            document.getElementById('resetBtn').style.display = "none";
            updateTimerDisplay();

            lastTime = Date.now();
            startTimer();
        }

        function openResetPrompt() {
            gameState = 'RESET_PROMPT';
            showOverlay();
            setSprite(BALL_SRC, { wiggle: false });
            setOverlayLabel('');
            document.getElementById('incubator').style.borderColor = "#38bdf8";
            document.getElementById('timer').style.display = "none";
            document.getElementById('resetBtn').style.display = "inline-block";
        }

        function resetGame(event) {
            event.stopPropagation();
            localStorage.removeItem('caught_ids');
            localStorage.removeItem('latest_catch_id');
            closeOverlayAndReset();
        }

        function startTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (gameState !== 'RUNNING' && gameState !== 'ECO') return;

                const currentTime = Date.now();
                const timePassed = currentTime - lastTime;
                lastTime = currentTime;

                if (timePassed > 4000) {
                    shatterEgg();
                    return;
                }

                duration--;
                updateTimerDisplay();

                if (duration <= 0) {
                    triggerSuccess();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            let minutes = Math.floor(duration / 60);
            let seconds = duration % 60;
            document.getElementById('timer').innerText =
                `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function handleOverlayClick() {
            if (gameState === 'RUNNING') {
                gameState = 'ECO';
                localStorage.setItem('soul_state', 'ECO');
                document.body.classList.add('eco-mode');
            }
            else if (gameState === 'ECO') {
                gameState = 'RUNNING';
                localStorage.setItem('soul_state', 'RUNNING');
                document.body.classList.remove('eco-mode');
                lastTime = Date.now();
            }
            else if (gameState === 'SUCCESS') {
                if (document.body.classList.contains('eco-mode')) {
                    document.body.classList.remove('eco-mode');
                    document.body.classList.remove('eco-success');
                    return;
                }
                closeOverlayAndReset();
            }
            else if (gameState === 'FAILED' || gameState === 'RESET_PROMPT') {
                closeOverlayAndReset();
            }
        }

        function triggerSuccess() {
            clearInterval(countdownInterval);
            const wasInEco = document.body.classList.contains('eco-mode');
            gameState = 'SUCCESS';
            localStorage.setItem('soul_state', 'SUCCESS');

            let caughtList = getCaughtList();
            if (!caughtList.includes(currentRewardId)) {
                caughtList.push(currentRewardId);
                localStorage.setItem('caught_ids', JSON.stringify(caughtList));
            }
            localStorage.setItem('latest_catch_id', currentRewardId);

            setSprite(frontSprite(currentRewardId), { wiggle: false });
            setOverlayLabel(labelFor(currentRewardId), '#4ade80');
            document.getElementById('incubator').style.borderColor = "#4ade80";
            document.getElementById('timer').style.color = "#4ade80";

            if (wasInEco) {
                document.body.classList.add('eco-success');
                celebrateInEco();
            }

            if (wakeLock) wakeLock.release();
        }

        function celebrateInEco() {
            if ('vibrate' in navigator) {
                try { navigator.vibrate([120, 60, 120]); } catch(e) {}
            }
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.18);
                gain.gain.setValueAtTime(0.0001, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) {}
        }

        function shatterEgg() {
            clearInterval(countdownInterval);
            gameState = 'FAILED';
            localStorage.setItem('soul_state', 'FAILED');

            if (currentRewardId) {
                setSprite(backSprite(currentRewardId), { wiggle: false });
                setOverlayLabel(labelFor(currentRewardId), '#f87171');
            } else {
                setSprite(BALL_SRC, { wiggle: false });
                setOverlayLabel('', '#f87171');
            }
            document.getElementById('incubator').style.borderColor = "#f87171";
            document.getElementById('timer').style.color = "#f87171";

            if (document.body.classList.contains('eco-mode')) {
                document.body.classList.remove('eco-mode');
                document.body.classList.remove('eco-success');
            }
            if (wakeLock) wakeLock.release();
        }

        function triggerCheatFail() {
            showOverlay();
            document.getElementById('timer').style.display = "block";
            document.getElementById('resetBtn').style.display = "none";
            document.body.classList.remove('eco-mode');
            document.body.classList.remove('eco-success');
            shatterEgg();
        }

        function closeOverlayAndReset() {
            gameState = 'IDLE';
            localStorage.setItem('soul_state', 'IDLE');
            localStorage.removeItem('current_reward_id');
            hideOverlay();
            document.body.classList.remove('eco-mode');
            document.body.classList.remove('eco-success');
            document.getElementById('resetBtn').style.display = "none";
            document.getElementById('timer').style.display = "block";
            document.getElementById('timer').style.color = "#38bdf8";
            setSprite(BALL_SRC, { wiggle: false });
            setOverlayLabel('');
            renderPokedexGrid();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' &&
                (gameState === 'RUNNING' || gameState === 'ECO')) {
                shatterEgg();
            }
        });
    </script>
</body>
</html>
