<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoulLock</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: #0a0a0f; 
            color: #e0e0e6;
            padding-top: 60px; 
            margin: 0;
            overflow: hidden;
            transition: background 0.5s, opacity 0.5s;
        }
        
        /* Eco-Modus Klasse für maximales Stromsparen */
        body.eco-mode {
            background: #000000 !important;
        }
        body.eco-mode h1, body.eco-mode p, body.eco-mode button, body.eco-mode #timer {
            opacity: 0.02; /* Fast unsichtbar = Pixel verbrauchen kaum Strom */
            pointer-events: none;
        }
        body.eco-mode #aura-container {
            transform: scale(0.2); /* Aura winzig machen */
        }

        h1 { font-weight: 300; letter-spacing: 2px; color: #a182ff; transition: opacity 0.5s; }
        p { color: #7a7a8c; font-size: 14px; padding: 0 20px; transition: opacity 0.5s; }
        
        #aura-container {
            width: 200px;
            height: 200px;
            margin: 40px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s;
        }
        #aura { font-size: 70px; z-index: 2; }
        
        .glow-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #5a3eff;
            box-shadow: 0 0 20px #5a3eff, inset 0 0 20px #5a3eff;
            animation: pulse 3s infinite ease-in-out;
            opacity: 0;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; box-shadow: 0 0 30px #913eff, inset 0 0 15px #913eff; border-color: #913eff; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        
        .status { font-weight: bold; font-size: 18px; margin-top: 20px; letter-spacing: 1px; }
        .alive { color: #5effa3; }
        .dead { color: #ff5e5e; }
        
        #timer { font-size: 32px; font-weight: 200; margin-top: 10px; color: #ffffff; transition: opacity 0.5s; }
        
        button {
            background: #251b4e;
            color: #a182ff;
            border: 1px solid #5a3eff;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        button:hover { background: #34257c; color: #ffffff; }
        
        #ecoBtn {
            background: #111118;
            border-color: #333;
            color: #666;
            display: none;
        }
        
        /* Ein unsichtbarer Klick-Overlay für den Eco-Modus-Ausstieg */
        #eco-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>

    <h1 id="title">SOUL LOCK</h1>
    <p id="instruction">Starte das Ritual. Wenn du die App schließt oder wechselst, bricht deine Seele.</p>
    
    <div id="aura-container">
        <div id="glow" class="glow-ring"></div>
        <div id="aura">🔒</div>
    </div>
    
    <div id="statusText" class="status">Prüfe Seelenzustand...</div>
    <div id="timer">10:00</div>
    
    <button id="startBtn" onclick="startRitual()">Ritual Starten</button>
    <button id="ecoBtn" onclick="toggleEcoMode()">⚡ Eco-Modus (Bildschirm dimmen)</button>
    <button id="resetBtn" onclick="forceReset()" style="display:none; background:#4e1b1b; border-color:#ff5e5e; color:#ff5e5e;">Neues Ritual starten</button>

    <div id="eco-overlay" onclick="toggleEcoMode()"></div>

    <script>
        let duration = 600; 
        let lastTime = Date.now();
        let isRunning = false;
        let isShattered = false;
        let wakeLock = null;

        // BEIM LADEN DER SEITE: Prüfen, ob der Nutzer geschummelt hat
        window.addEventListener('load', () => {
            const savedState = localStorage.getItem('soulLock_state');
            
            if (savedState === 'RUNNING') {
                // Ertappt! Die App wurde im laufenden Betrieb geschlossen
                shatterSoul("Du hast die App mutwillig geschlossen!");
            } else if (savedState === 'SHATTERED') {
                // Bleibt gesperrt, bis man aktiv den Reset-Knopf drückt
                shatterSoul("Deine Seele ist noch immer gebrochen.");
            } else {
                document.getElementById('statusText').innerText = "Bereit für das Ritual...";
            }
        });

        async function startRitual() {
            if (isRunning || isShattered) return;
            
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock blockiert."); }

            isRunning = true;
            localStorage.setItem('soulLock_state', 'RUNNING'); // Zustand im iPhone sichern
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ecoBtn').style.display = 'inline-block';
            document.getElementById('glow').style.opacity = '1';
            document.getElementById('aura').innerText = '✨';
            document.getElementById('statusText').innerText = "Seele fixiert. Nicht ablenken lassen...";
            document.getElementById('statusText').className = "status alive";
            lastTime = Date.now();
        }

        // Haupt-Countdown
        const countdown = setInterval(() => {
            if (!isRunning || isShattered) return;

            const currentTime = Date.now();
            const timePassed = currentTime - lastTime;
            lastTime = currentTime;

            // Erkennung für den iOS-Sperrzustand (falls WakeLock fehlschlägt)
            if (timePassed > 4000) {
                shatterSoul("Das Handy ging in den Standby!"); 
                return;
            }

            duration--;
            let minutes = Math.floor(duration / 60);
            let seconds = duration % 60;
            document.getElementById('timer').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (duration <= 0) {
                clearInterval(countdown);
                isRunning = false;
                localStorage.setItem('soulLock_state', 'SUCCESS');
                document.getElementById('aura').innerText = '🔮';
                document.getElementById('statusText').innerText = "Erfolgreich! Deine Seele ist gestärkt.";
                document.getElementById('glow').style.borderColor = "#5effa3";
                document.getElementById('glow').style.boxShadow = "0 0 30px #5effa3";
                document.getElementById('ecoBtn').style.display = 'none';
                if(document.body.classList.contains('eco-mode')) toggleEcoMode();
                if (wakeLock) wakeLock.release();
            }
        }, 1000);

        // App-Wechsel Erkennung
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && isRunning && !isShattered) {
                shatterSoul("Du hast die Webseite verlassen!");
            }
        });

        // ECO-MODUS (Tiefschwarzer Bildschirm spart Strom auf OLED)
        function toggleEcoMode() {
            if (!isRunning || isShattered) return;
            
            const body = document.body;
            const overlay = document.getElementById('eco-overlay');
            
            if (!body.classList.contains('eco-mode')) {
                body.classList.add('eco-mode');
                overlay.style.display = 'block'; // Aktiviert Klickschutz über dem ganzen Bildschirm
            } else {
                body.classList.remove('eco-mode');
                overlay.style.display = 'none';
                lastTime = Date.now(); // Zeit-Resync nach dem Aufwachen
            }
        }

        function shatterSoul(reason) {
            isShattered = true;
            isRunning = false;
            localStorage.setItem('soulLock_state', 'SHATTERED'); // Permanent merken!
            
            document.getElementById('aura').innerText = '💥';
            document.getElementById('statusText').innerText = `Gebrochen: ${reason}`;
            document.getElementById('statusText').className = "status dead";
            document.getElementById('glow').style.borderColor = "#ff5e5e";
            document.getElementById('glow').style.boxShadow = "0 0 30px #ff5e5e";
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ecoBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
            
            if(document.body.classList.contains('eco-mode')) {
                document.body.classList.remove('eco-mode');
                document.getElementById('eco-overlay').style.display = 'none';
            }
            if (wakeLock) wakeLock.release();
        }

        function forceReset() {
            localStorage.setItem('soulLock_state', 'IDLE');
            location.reload(); // Seite neu laden für einen sauberen Neustart
        }
    </script>
</body>
</html>
